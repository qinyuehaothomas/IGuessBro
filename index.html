<!DOCTYPE html>
<html>
<head>
    <title>I Guess Bro</title>
    <!-- Make sure your rendered.css includes Tailwind v4 -->
    <link rel="stylesheet" type="text/css" href="rendered.css">
    <link rel="icon" href="/favicon.png" type="image/x-icon">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <script src="animation.js"></script>
</head>
<body class="bg-gray-800 relative">

    <!-- FIXME: Lowk a good idea is to screw scroll lock and just dump eveything into one page -->

    
    <div id="start" class="absolute w-screen h-screen flex flex-col flex-none  items-center justify-center  gap-4 ">

        <h1 class="text-[clamp(1rem,4vw,2.5rem)] text-center">Think of A Number from 1 to</h1>
        <input id="max_guess" name="max_guess" type="number" step="1" value="81" required 
            class="text-center text-[4rem] max-w-20 bg-transparent border-0 border-G/50 outline-none transition-all duration-200 hover:border-b-4">
        
        <div class="group">
            <p for="howto" class="peer text-1rem text-G/75 cursor-pointer select-none">
                How to Play
            </p>
            <ol class="max-h-0 group-hover:max-h-40 overflow-hidden transition-all duration-300 bg-gray-800 rounded text-sm text-G/75 max-w-md list-decimal list-inside">
                <li>Think of a number between 1 and the max you set.</li>
                <li>I'll guess by showing you cards.</li>
                <li>Tell me the color of your number. Answer honestly.</li>
                <li>I'll reveal your number using magic!</li>
            </ol>

        </div>

        <button id="start_btn" class="text-[1rem] px-8 py-3 bg-G/20 rounded hover:bg-G/50/40 transition">Start</button>
    </div>
    
    <div id="qn" class="absolute flex flex-col flex-none w-screen h-screen hidden">
        <div id="blub" class="flex justify-evenly items-center self-center max-w-[33vh] mx-auto my-8">
        </div>

        <div id="ngrid" class=" justify-self-center self-center justify-evenly flex flex-row  flex-wrap  max-w-[clamp(1rem,100vh,80vw)] gap-2">
            <!-- Required, for tailwind to render -->
            <div class="size-1/10  text-G  bg-B">1</div>
            <div class="size-1/10  text-R bg-Y">2</div>
            <div class="size-1/10  text-Y bg-R">3</div>
            <div class="size-1/10  text-B bg-G">4</div>
            <div class="size-1/10  text-G  bg-B/50">1</div>
            <div class="size-1/10  text-R bg-Y/50">2</div>
            <div class="size-1/10  text-Y bg-R/50">3</div>
            <div class="size-1/10  text-B bg-G/50">4</div>
        </div>

        <div id="btns" class="my-5 flex flex-row w-full justify-evenly  flex-wrap">
        </div>
    </div>

    <div  id="answer" class="absolute inset-0 w-screen h-screen justify-center items-center flex flex-col  flex-none hidden ">
        <h2 class="text-[clamp(1rem,4vw,2.5rem)]">Your Number is ...</h2>
        <h1 id="ans_num" class="text-[clamp(1rem,20vw,10rem)]"></h1>
        <button onclick="location.reload()" class="m-5 text-md text-dim hover:text-white transition">↺ Retry</button>
        <a href="https://github.com/yourusername" target="_blank" class="text-dim hover:text-white transition">

        </a>

        </div>
    </div>
</body>
</html>
